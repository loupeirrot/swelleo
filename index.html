<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌊 SurfAlert</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --go: #4fe0c0; --pro: #ff9a5c; --mid: #ffce6a; --low: #7fb4e6; --red: #9a93b8;
    --bg-top: #0b2545; --card: rgba(255,255,255,0.10); --stroke: rgba(255,255,255,0.20);
    --text: #f3f8fc; --dim: rgba(220,235,248,0.64);
    --head: 'Quicksand', sans-serif; --body: 'Nunito Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--body); color: var(--text); line-height: 1.55; min-height: 100vh;
    background: linear-gradient(165deg, #0b2545 0%, #13315c 34%, #0a4d68 68%, #088395 100%);
    background-attachment: fixed; position: relative; overflow-x: hidden;
  }
  .blob { position: fixed; border-radius: 50%; filter: blur(72px); z-index: 0; pointer-events: none; }
  .blob.a { width: 320px; height: 320px; background: #2ec4b6; opacity: 0.30; top: 120px; right: -60px; }
  .blob.b { width: 300px; height: 300px; background: #4cc9f0; opacity: 0.26; top: 46%; left: -100px; }
  .blob.c { width: 260px; height: 260px; background: #1d9e75; opacity: 0.24; top: 66%; right: -80px; }

  .banner { position: relative; width: 100%; height: 240px; z-index: 1; overflow: hidden; }
  .banner img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .banner .fade { position: absolute; inset: 0;
    background: linear-gradient(to bottom, transparent 0%, transparent 42%, var(--bg-top) 100%); }
  .banner .title { position: absolute; left: 0; right: 0; bottom: 16px; text-align: center; z-index: 2; padding: 0 16px; }
  .banner h1 { font-family: var(--head); font-size: 2.3rem; font-weight: 700; letter-spacing: 0.5px;
    text-shadow: 0 2px 18px rgba(0,0,0,0.45); }
  .banner .subtitle { color: rgba(255,255,255,0.85); font-size: 0.95rem; text-shadow: 0 1px 10px rgba(0,0,0,0.5); }

  .wrap { position: relative; z-index: 1; max-width: 640px; margin: 0 auto; padding: 18px 18px 48px; }
  .updated { text-align: center; color: var(--dim); font-size: 0.74rem; margin-bottom: 20px; }

  .filters { display: flex; flex-wrap: wrap; gap: 9px; justify-content: center; margin-bottom: 26px; }
  .filters button {
    background: var(--card); border: 1px solid var(--stroke); color: var(--dim);
    border-radius: 30px; padding: 9px 17px; font-family: var(--head); font-size: 0.84rem;
    font-weight: 500; cursor: pointer; transition: all .25s;
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  }
  .filters button:hover { color: var(--text); }
  .filters button.active { background: linear-gradient(135deg, var(--go), #2bb4d8); color: #06281f;
    border-color: transparent; font-weight: 700; box-shadow: 0 6px 20px rgba(79,224,192,0.4); }

  .card { background: var(--card); backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%); border: 1px solid var(--stroke);
    border-radius: 26px; box-shadow: 0 14px 40px rgba(4,12,28,0.36), inset 0 1px 0 rgba(255,255,255,0.20); }

  .label { font-family: var(--head); font-size: 0.72rem; text-transform: uppercase;
    letter-spacing: 2px; color: var(--dim); margin: 4px 6px 14px; font-weight: 600; }

  .hero { padding: 26px 24px; margin-bottom: 24px; position: relative; overflow: hidden; }
  .hero::after { content: ""; position: absolute; top: -45%; right: -20%; width: 300px; height: 300px;
    border-radius: 50%; filter: blur(55px); opacity: 0.50; background: var(--hero-glow, #4fe0c0); }
  .hero .htag { position: relative; font-family: var(--head); font-size: 0.78rem; font-weight: 700;
    letter-spacing: 0.5px; padding: 5px 13px; border-radius: 30px; display: inline-block; }
  .hero .hscore { position: relative; display: flex; align-items: baseline; gap: 10px; margin: 16px 0 4px; }
  .hero .hscore .n { font-family: var(--head); font-size: 4.2rem; font-weight: 700; line-height: 0.85;
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .hero .hscore .o { font-size: 1rem; color: var(--dim); }
  .hero .hwhere { position: relative; font-family: var(--head); font-size: 1.5rem; font-weight: 600; }
  .hero .hwhen { position: relative; font-size: 1rem; margin-top: 2px; }
  .hero .hcond { position: relative; color: var(--dim); font-size: 0.9rem; margin-top: 13px; }

  .session { display: flex; align-items: center; gap: 16px; padding: 15px 18px; margin-bottom: 13px; }
  .score-box { flex-shrink: 0; width: 58px; height: 58px; border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: var(--head); color: #0a2018; font-weight: 700;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), 0 4px 14px rgba(0,0,0,0.2); }
  .score-box .n { font-size: 1.45rem; line-height: 1; }
  .info { flex: 1; min-width: 0; }
  .tag { font-family: var(--head); font-size: 0.66rem; font-weight: 700; letter-spacing: 0.5px;
    color: var(--dim); margin-bottom: 2px; display: block; }
  .where { font-family: var(--head); font-size: 1.12rem; font-weight: 600; }
  .when { font-size: 0.9rem; } .when .pic { color: var(--dim); }
  .cond { font-size: 0.8rem; color: var(--dim); margin-top: 3px; }

  .empty { padding: 22px; text-align: center; color: var(--dim); font-size: 0.92rem; margin-bottom: 16px; }

  .toggle { width: 100%; margin-top: 18px; padding: 15px; font-family: var(--head); font-size: 0.9rem;
    font-weight: 600; cursor: pointer; color: var(--text); background: var(--card);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--stroke); border-radius: 22px; }
  #detail { margin-top: 14px; } #detail.hidden { display: none; }

  .spot { padding: 18px; margin-bottom: 15px; }
  .spot-head { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
  .spot-name { font-family: var(--head); font-size: 1.1rem; font-weight: 600; }
  .badge-fire { font-family: var(--head); font-size: 0.6rem; font-weight: 700; letter-spacing: 0.5px;
    background: linear-gradient(135deg,#ff7b9c,#ff9a5c); color: #3a0f1a; padding: 3px 10px; border-radius: 30px; }
  .day { margin-top: 13px; }
  .day-label { font-family: var(--head); font-size: 0.72rem; color: var(--dim); margin-bottom: 6px;
    text-transform: capitalize; font-weight: 600; }
  .timeline { display: flex; gap: 4px; }
  .cell { flex: 1; min-width: 0; height: 44px; border-radius: 13px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 0.6rem; color: rgba(12,28,22,0.88); position: relative; transition: all .2s;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.25); }
  .cell .h { font-size: 0.52rem; opacity: 0.72; } .cell .sc { font-family: var(--head); font-weight: 700; font-size: 0.74rem; }
  .cell.dim { opacity: 0.24; } .cell.night { opacity: 0.13; box-shadow: none; }
  .cell:hover::after { content: attr(data-tip); position: absolute; bottom: 116%; left: 50%;
    transform: translateX(-50%); background: rgba(8,20,38,0.95); backdrop-filter: blur(10px);
    border: 1px solid var(--stroke); color: #fff; padding: 9px 12px; border-radius: 14px;
    font-size: 0.7rem; white-space: pre; z-index: 10; pointer-events: none; }
  .legend { display: flex; flex-wrap: wrap; gap: 13px; justify-content: center; margin: 16px 0;
    font-size: 0.68rem; color: var(--dim); }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .dot { width: 12px; height: 12px; border-radius: 5px; display: inline-block; }
  footer { text-align: center; color: var(--dim); font-size: 0.72rem; margin-top: 30px; }
  .error { padding: 20px; text-align: center; }
</style>
</head>
<body>
<div class="blob a"></div><div class="blob b"></div><div class="blob c"></div>

<div class="banner">
  <img id="banner-img" src="assets/wave-golden.webp" alt="Conditions de surf sur la côte landaise">
  <div class="fade"></div>
  <div class="title">
    <h1>SurfAlert</h1>
    <div class="subtitle">les meilleures sessions — côte landaise</div>
  </div>
</div>

<div class="wrap">
  <div class="updated" id="updated"></div>
  <div class="card" id="resume" style="padding:15px 18px;margin-bottom:20px;font-size:0.92rem;display:none"></div>
  <div class="filters" id="myspots-bar" style="margin-bottom:14px"></div>
  <div class="card" id="spots-panel" style="padding:8px 10px;margin-bottom:20px;display:none"></div>

  <div class="filters" id="filters">
    <button data-th="0">tout voir</button>
    <button data-th="6">🆗 ≥6</button>
    <button data-th="7.5" class="active">🤙 à l'eau</button>
    <button data-th="8.5">🔥 ça envoie</button>
  </div>

  <div id="summary"></div>

  <button class="toggle" id="toggle">voir le détail heure par heure ↓</button>
  <div id="detail" class="hidden"></div>

  <footer>données Open-Meteo · surfalert.fr</footer>
</div>

<script>
const GO = 7.5, PRO = 8.5;
let DATA = null, TIDES = {}, threshold = 7.5;
let FAVS = JSON.parse(localStorage.getItem('surfalert_favs') || '[]');

function grad(s) {
  if (s >= PRO) return 'linear-gradient(135deg,#ffb86c,#ff8a4c)';
  if (s >= GO)  return 'linear-gradient(135deg,#5dffc0,#2bb4d8)';
  if (s >= 6)   return 'linear-gradient(135deg,#ffe08a,#ffc24c)';
  if (s >= 4)   return 'linear-gradient(135deg,#a9d4f2,#7fb4e6)';
  return 'linear-gradient(135deg,#aaa2c8,#8f88ad)';
}
function solid(s) {
  if (s >= PRO) return '#ff9a5c'; if (s >= GO) return '#4fe0c0';
  if (s >= 6) return '#ffce6a'; if (s >= 4) return '#7fb4e6'; return '#9a93b8';
}
// ───── Mes spots / favoris (stockés en local sur l'appareil) ─────
function activeSpots() {
  if (!DATA) return [];
  if (FAVS.length) { const f = DATA.spots.filter(s => FAVS.includes(s.name)); if (f.length) return f; }
  return DATA.spots;
}
function saveFavs() { localStorage.setItem('surfalert_favs', JSON.stringify(FAVS)); }
function toggleFav(name) {
  const i = FAVS.indexOf(name);
  if (i >= 0) FAVS.splice(i, 1); else FAVS.push(name);
  saveFavs(); refreshSpots();
}
function refreshSpots() { renderMySpotsBar(); renderSpotsPanel(); setBanner(DATA); setResume(DATA); rerender(); }
function renderMySpotsBar() {
  const bar = document.getElementById('myspots-bar'); if (!bar) return;
  const n = FAVS.length;
  bar.innerHTML = `<button id="spots-toggle">⭐ mes spots${n ? ' (' + n + ')' : ''}</button>`
    + (n ? `<button id="spots-clear">tout afficher</button>` : '');
  document.getElementById('spots-toggle').onclick = () => {
    const p = document.getElementById('spots-panel');
    p.style.display = p.style.display === 'none' ? 'block' : 'none';
  };
  const clr = document.getElementById('spots-clear');
  if (clr) clr.onclick = () => { FAVS = []; saveFavs(); refreshSpots(); };
}
function renderSpotsPanel() {
  const panel = document.getElementById('spots-panel'); if (!panel || !DATA) return;
  const byRegion = {};
  for (const s of DATA.spots) (byRegion[s.region] = byRegion[s.region] || []).push(s);
  panel.innerHTML = Object.keys(byRegion).map(region => {
    const spots = byRegion[region];
    const allOn = spots.every(s => FAVS.includes(s.name));
    return `<div class="region-head" data-region="${region}" style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;margin:10px 6px 4px">
        <span class="label" style="margin:0">${region}</span>
        <span style="font-size:0.72rem;color:var(--go)">${allOn ? '✓ tout retirer' : '+ tout sélectionner'}</span>
      </div>`
      + spots.map(s => {
          const on = FAVS.includes(s.name);
          return `<div class="spotrow" data-name="${s.name}" style="display:flex;justify-content:space-between;align-items:center;padding:9px 10px;border-radius:12px;cursor:pointer;${on ? 'background:rgba(79,224,192,0.14)' : ''}">
            <span>${s.name}</span><span style="font-size:1.05rem">${on ? '⭐' : '☆'}</span></div>`;
        }).join('');
  }).join('');
  panel.querySelectorAll('.region-head').forEach(h => { h.onclick = () => toggleRegion(h.dataset.region); });
  panel.querySelectorAll('.spotrow').forEach(row => { row.onclick = () => toggleFav(row.dataset.name); });
}
function toggleRegion(region) {
  const names = DATA.spots.filter(s => s.region === region).map(s => s.name);
  const allOn = names.every(n => FAVS.includes(n));
  if (allOn) FAVS = FAVS.filter(n => !names.includes(n));
  else names.forEach(n => { if (!FAVS.includes(n)) FAVS.push(n); });
  saveFavs(); refreshSpots();
}
// Bandeau adapté aux conditions de l'instant : on prend l'heure la plus proche de
// maintenant, sur le spot qui marche le mieux à cet instant, et on choisit l'image.
function currentEntry() {
  const now = Date.now(); let best = null;
  for (const spot of activeSpots()) {
    if (!spot.hours.length) continue;
    const h = spot.hours.reduce((a, b) =>
      Math.abs(new Date(b.time) - now) < Math.abs(new Date(a.time) - now) ? b : a);
    if (!best || h.score > best.score) best = h;
  }
  return best;
}
function pickBanner(h) {
  if (!h) return 'golden';
  if (!h.daytime) return 'night';                       // nuit / avant l'aube
  if (!h.offshore && h.score < 5) return 'messy';       // onshore et médiocre
  if (h.light >= 9 && h.score >= 6) return 'golden';    // golden hour + ça marche
  if (h.score >= 8) return 'epic';                      // gros et puissant
  if (h.score >= 6) return 'clean';                     // propre et surfable
  return 'flat';                                        // petit / plat
}
// Une palette par ambiance — toutes dans la même famille de tons océan.
// top = couleur du haut (sert aussi au fondu du bandeau) ; blobs = les 3 taches floutées.
const PALETTES = {
  flat:   { top: '#0e2e52', bg: 'linear-gradient(165deg,#0e2e52 0%,#1b5080 34%,#2a90a0 68%,#6cc3cf 100%)', blobs: ['#4cc9f0','#7ad0e0','#3fb6c4'] },
  clean:  { top: '#0b2d50', bg: 'linear-gradient(165deg,#0b2d50 0%,#115a86 34%,#0f8fa3 68%,#22bccb 100%)', blobs: ['#2ec4b6','#1fb6c4','#4cc9f0'] },
  epic:   { top: '#06152b', bg: 'linear-gradient(165deg,#06152b 0%,#0c2c52 34%,#0a3d54 68%,#066b7a 100%)', blobs: ['#0a6b7a','#13558a','#1d9e75'] },
  golden: { top: '#0c2546', bg: 'linear-gradient(165deg,#0c2546 0%,#1a3a63 32%,#3a5f7e 62%,#b98a5c 100%)', blobs: ['#2ec4b6','#e0a96d','#4cc9f0'] },
  messy:  { top: '#172430', bg: 'linear-gradient(165deg,#172430 0%,#28414f 34%,#33565c 68%,#4a7077 100%)', blobs: ['#3a5560','#4a7077','#5a7a72'] },
  night:  { top: '#070b1f', bg: 'linear-gradient(165deg,#070b1f 0%,#0d1738 34%,#0a2440 68%,#0a3550 100%)', blobs: ['#13315c','#1a2a5a','#0a3d54'] },
};
function setBanner(data) {
  const mood = pickBanner(currentEntry());
  const img = document.getElementById('banner-img');
  if (img) img.src = 'assets/wave-' + mood + '.webp';
  const p = PALETTES[mood]; if (!p) return;
  document.body.style.backgroundImage = p.bg;                 // garde background-attachment: fixed
  document.documentElement.style.setProperty('--bg-top', p.top);
  document.querySelectorAll('.blob').forEach((el, i) => { if (p.blobs[i]) el.style.background = p.blobs[i]; });
}
// Résumé en une phrase : conditions de l'instant + meilleure fenêtre à venir.
function sizeWord(h) {
  if (h < 0.5) return 'plat'; if (h < 1) return 'petit';
  if (h < 1.5) return 'petit à moyen'; if (h < 2) return 'moyen';
  if (h < 3) return 'costaud'; return 'gros';
}
function bestUpcoming() {
  const since = Date.now() - 3600 * 1000; let best = null;
  for (const spot of activeSpots()) for (const h of spot.hours) {
    if (!h.daytime || new Date(h.time) < since) continue;
    if (!best || h.score > best.h.score) best = { spot, h };
  }
  return best;
}
function setResume(data) {
  const el = document.getElementById('resume'); if (!el) return;
  const now = currentEntry(), up = bestUpcoming();
  const dateStr = new Date().toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
  let txt = '';
  if (now) { const v = verdict(now.score); txt += `${v.emoji} <b>${v.label}</b> maintenant · `; }
  txt += `<b>${dateStr}</b> · `;
  if (now) txt += `${sizeWord(now.wave_h)} (~${now.wave_h}m, ${now.wind_spd}km/h ${now.offshore ? 'offshore ✅' : 'onshore ⚠️'}).`;
  if (up) {
    const when = whenLabel(up.h.time, data.jours_fr), hr = new Date(up.h.time).getHours();
    txt += up.h.score >= GO
      ? ` <b>meilleure fenêtre</b> : ${when} ~${hr}h à ${up.spot.name} (${up.h.score}/10).`
      : ` rien de marquant ces prochains jours — au mieux ${when} ~${hr}h à ${up.spot.name} (${up.h.score}/10).`;
  }
  el.innerHTML = txt;
  el.style.display = 'block';
}
function whenLabel(dateStr, joursFr) {
  const d = new Date(dateStr), today = new Date(); today.setHours(0,0,0,0);
  const that = new Date(d); that.setHours(0,0,0,0);
  const diff = Math.round((that - today) / 86400000);
  const jour = joursFr[(d.getDay() + 6) % 7];
  const dm = d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' });
  if (diff === 0) return "aujourd'hui"; if (diff === 1) return 'demain';
  return `${jour} ${dm}`;
}
function findWindows(hours, th) {
  const day = hours.filter(h => h.daytime); const windows = []; let cur = null;
  for (const h of day) {
    if (h.score >= th || (th === 0 && h.score >= 4)) {
      if (cur && (new Date(h.time) - new Date(cur[cur.length-1].time)) <= 3600*1000+1) cur.push(h);
      else { if (cur) windows.push(cur); cur = [h]; }
    } else if (cur) { windows.push(cur); cur = null; }
  }
  if (cur) windows.push(cur);
  return windows.map(w => ({ start: w[0].time, end: w[w.length-1].time,
    peak: w.reduce((a,b) => b.score > a.score ? b : a) }));
}
function bestHour(hours) { const d = hours.filter(h => h.daytime);
  return d.length ? d.reduce((a,b) => b.score > a.score ? b : a) : null; }
// Verdict go/no-go — l'arme n°1. Seuils : GO ≥6.5 · BOF 4.5–6.5 · NON <4.5
function verdict(s) {
  if (s >= 6.5) return { label: 'GO',  emoji: '🟢', color: '#34e89e' };
  if (s >= 4.5) return { label: 'BOF', emoji: '🟠', color: '#ffb454' };
  return { label: 'NON', emoji: '🔴', color: '#ff6b6b' };
}
function tagText(score, priority) {
  const v = verdict(score);
  if (score >= PRO && priority === 'fire') return v.emoji + ' GO · ça envoie 🔥';
  return v.emoji + ' ' + v.label;
}
function condLine(p) {
  return `🌊 ${p.wave_h}m ${p.wave_p}s ${p.swell_label} · 💨 ${p.wind_spd}km/h ${p.wind_label} ${p.offshore ? '✅ offshore' : '⚠️ onshore'}`;
}
// Indicateur météo / lumière — séparé de la note de surf.
function shootLine(p) {
  const ciel = p.cloud < 30 ? 'ciel dégagé' : (p.cloud < 70 ? 'ciel voilé' : 'ciel couvert');
  const golden = p.light >= 9 ? '☀️ golden hour · ' : '';
  return `${golden}${ciel} · ${p.cloud}% nuages`;
}
// Marée encadrant la session : extremum juste avant → juste après le pic.
function tideLine(timeStr, tides) {
  if (!tides || !tides.length) return '';
  const t = new Date(timeStr).getTime();
  let before = null, after = null;
  for (const e of tides) {
    const et = new Date(e.time).getTime();
    if (et <= t) before = e;
    else if (!after) after = e;
  }
  const fmt = e => `${e.type === 'haute' ? 'haute' : 'basse'} ${new Date(e.time).getHours()}h${String(new Date(e.time).getMinutes()).padStart(2, '0')}`;
  const shown = [before, after].filter(Boolean);
  const est = shown.some(e => e.est);   // marée estimée par cycle (API indispo)
  const parts = shown.map(fmt);
  return parts.length ? '🌊 marée : ' + parts.join(' → ') + (est ? ' ≈' : '') : '';
}
// Quand : "demain à 9h" (créneau d'1h) ou "demain · 9h–11h" (fenêtre).
function whenRange(win, joursFr) {
  const when = whenLabel(win.start, joursFr);
  const sH = new Date(win.start).getHours(), eH = new Date(win.end).getHours();
  return sH === eH ? `<b>${when}</b> à ${sH}h` : `<b>${when}</b> · ${sH}h–${eH}h`;
}
function range(win) {
  const sH = new Date(win.start).getHours(), eH = new Date(win.end).getHours();
  return sH === eH ? `${sH}h` : `${sH}h → ${eH}h`;
}
function heroCard(spot, win, joursFr) {
  const p = win.peak, c = solid(p.score), g = grad(p.score), v = verdict(p.score);
  const tide = tideLine(p.time, TIDES[spot.region]);
  return `<div class="card hero" style="--hero-glow:${c}">
    <span class="htag" style="background:${v.color}30;color:${v.color};border:1px solid ${v.color}66">${tagText(p.score, spot.priority)}</span>
    <div class="hscore"><span class="n" style="background-image:${g}">${p.score}</span><span class="o">/10</span></div>
    <div class="hwhere">${spot.name}</div>
    <div class="hwhen">${whenRange(win, joursFr)}</div>
    <div class="hcond">${condLine(p)}</div>
    ${tide ? `<div class="hcond" style="margin-top:6px">${tide}</div>` : ''}
    <div class="hcond" style="margin-top:6px;opacity:0.85">${shootLine(p)}</div>
  </div>`;
}
function sessionCard(spot, win, joursFr) {
  const p = win.peak;
  const tide = tideLine(p.time, TIDES[spot.region]);
  return `<div class="card session">
    <div class="score-box" style="background:${grad(p.score)}"><span class="n">${p.score}</span></div>
    <div class="info">
      <span class="tag">${tagText(p.score, spot.priority)}</span>
      <div class="where">${spot.name}</div>
      <div class="when">${whenRange(win, joursFr)}</div>
      <div class="cond">${condLine(p)}</div>
      ${tide ? `<div class="cond" style="margin-top:2px">${tide}</div>` : ''}
      <div class="cond" style="margin-top:2px;opacity:0.85">${shootLine(p)}</div>
    </div></div>`;
}
function renderSummary() {
  const all = [];
  for (const spot of activeSpots())
    for (const win of findWindows(spot.hours, threshold)) all.push({ spot, win });
  const el = document.getElementById('summary');
  if (!all.length) {
    const tops = activeSpots().map(s => ({ spot: s, h: bestHour(s.hours) }))
      .filter(x => x.h).sort((a,b) => b.h.score - a.h.score).slice(0, 4);
    const [first, ...rest] = tops;
    el.innerHTML = `<div class="card empty">😴 aucune session ≥ ${threshold} dans les 5 prochains jours.<br>
      <span style="font-size:0.8rem">voici les meilleurs moments malgré tout :</span></div>`
      + (first ? `<div class="label">le meilleur créneau</div>` + heroCard(first.spot, { start: first.h.time, end: first.h.time, peak: first.h }, DATA.jours_fr) : '')
      + (rest.length ? `<div class="label">autres options</div>` + rest.map(({spot, h}) =>
          sessionCard(spot, { start: h.time, end: h.time, peak: h }, DATA.jours_fr)).join('') : '');
    return;
  }
  const hero = all.reduce((a, b) => b.win.peak.score > a.win.peak.score ? b : a);
  const rest = all.filter(x => x !== hero).sort((a, b) => new Date(a.win.start) - new Date(b.win.start));
  el.innerHTML = `<div class="label">ta meilleure session</div>`
    + heroCard(hero.spot, hero.win, DATA.jours_fr)
    + (rest.length ? `<div class="label">les autres créneaux</div>`
        + rest.map(({spot, win}) => sessionCard(spot, win, DATA.jours_fr)).join('') : '');
}
function groupByDay(hours) { const d = {};
  for (const h of hours) (d[h.time.slice(0,10)] = d[h.time.slice(0,10)] || []).push(h); return d; }
function renderDetail() {
  const el = document.getElementById('detail');
  const legend = `<div class="legend">
    <span><i class="dot" style="background:var(--red)"></i>&lt;4</span>
    <span><i class="dot" style="background:var(--low)"></i>4–6</span>
    <span><i class="dot" style="background:var(--mid)"></i>6–7.5</span>
    <span><i class="dot" style="background:var(--go)"></i>≥7.5</span>
    <span><i class="dot" style="background:var(--pro)"></i>≥8.5</span></div>`;
  el.innerHTML = legend + activeSpots().map(spot => {
    const fire = spot.priority === 'fire' ? '<span class="badge-fire">fire</span>' : '';
    const days = groupByDay(spot.hours);
    const rows = Object.keys(days).sort().map(key => {
      const slot = days[key].filter(h => { const hr = new Date(h.time).getHours(); return hr >= 6 && hr <= 21; });
      const cells = slot.map(h => {
        const hr = new Date(h.time).getHours(), below = h.score < threshold;
        const bg = h.daytime ? grad(h.score) : 'rgba(255,255,255,0.06)';
        const cls = !h.daytime ? 'night' : (below ? 'dim' : '');
        const tip = `${hr}h · ${h.score}/10\n${h.wave_h}m ${h.wave_p}s ${h.swell_label}\n💨 ${h.wind_spd}km/h ${h.wind_label} ${h.offshore?'offshore':'onshore'}\n☁️ ${h.cloud}%`;
        return `<div class="cell ${cls}" style="background:${bg}" data-tip="${tip}">
          <span class="h">${hr}h</span><span class="sc">${h.score>=4?h.score:''}</span></div>`;
      }).join('');
      return `<div class="day"><div class="day-label">${whenLabel(key, DATA.jours_fr)}</div>
        <div class="timeline">${cells}</div></div>`;
    }).join('');
    return `<div class="card spot"><div class="spot-head"><span class="spot-name">${spot.name}</span>${fire}</div>${rows}</div>`;
  }).join('');
}
function rerender() { renderSummary(); renderDetail(); }
function init(data) {
  DATA = data;
  TIDES = data.tides || {};
  setBanner(data);
  setResume(data);
  renderMySpotsBar();
  renderSpotsPanel();
  const upd = new Date(data.generated_at);
  document.getElementById('updated').textContent = 'mis à jour le ' + upd.toLocaleDateString('fr-FR')
    + ' à ' + upd.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  document.querySelectorAll('#filters button').forEach(btn => btn.addEventListener('click', () => {
    document.querySelectorAll('#filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); threshold = parseFloat(btn.dataset.th); rerender();
  }));
  document.getElementById('toggle').addEventListener('click', () => {
    const d = document.getElementById('detail'); d.classList.toggle('hidden');
    document.getElementById('toggle').textContent = d.classList.contains('hidden')
      ? 'voir le détail heure par heure ↓' : 'masquer le détail ↑';
  });
  rerender();
}
fetch('data.json?t=' + Date.now()).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(init).catch(err => { document.getElementById('summary').innerHTML =
    `<div class="card error">⚠️ lance le serveur : <code>python3 serve.py</code> (${err.message})</div>`; });
</script>
</body>
